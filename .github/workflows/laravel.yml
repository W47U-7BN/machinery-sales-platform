name: Laravel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, pdo_mysql, bcmath, gd, zip, intl, opcache, redis
          coverage: none

      - name: Install Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy Environment
        run: cp .env.example .env

      - name: Generate Key
        run: php artisan key:generate

      - name: Configure Testing DB
        run: |
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/' .env
          sed -i 's/# DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/# DB_PORT=3306/DB_PORT=3306/' .env
          sed -i 's/# DB_DATABASE=laravel/DB_DATABASE=testing/' .env
          sed -i 's/# DB_USERNAME=root/DB_USERNAME=test/' .env
          sed -i 's/# DB_PASSWORD=/DB_PASSWORD=test/' .env

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Run Seeders
        run: php artisan db:seed --force

      - name: Run Feature & Unit Tests
        run: php artisan test --parallel

      - name: Check Coding Standards
        run: vendor/bin/pint --test -v

      - name: Run Static Analysis
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress || true

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build
