name: Tests

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4]
        laravel: [12.*]

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_mysql, bcmath, gd, zip, intl, opcache
          coverage: xdebug

      - name: Install Dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy Environment
        run: cp .env.example .env

      - name: Generate Key
        run: php artisan key:generate

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress

      - name: Run Laravel Pint
        run: vendor/bin/pint --test -v

      - name: Run Tests
        run: php artisan test --parallel --coverage
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: :memory:

      - name: Run Browser Tests (if Dusk configured)
        if: false
        run: php artisan dusk
