services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ims-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=industrial_machinery
      - DB_USERNAME=ims_user
      - DB_PASSWORD=ims_secret
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
    depends_on:
      - mysql
      - redis
      - meilisearch
    networks:
      - ims-network

  nginx:
    image: nginx:alpine
    container_name: ims-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ims-network

  mysql:
    image: mysql:8.0
    container_name: ims-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: industrial_machinery
      MYSQL_USER: ims_user
      MYSQL_PASSWORD: ims_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ims-network

  redis:
    image: redis:7-alpine
    container_name: ims-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ims-network

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: ims-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ims_meili_master_key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - ims-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: ims-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ims-network

  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ims-horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - .:/var/www
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - ims-network

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ims-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - .:/var/www
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - ims-network

volumes:
  mysql_data:
  redis_data:
  meilisearch_data:

networks:
  ims-network:
    driver: bridge
