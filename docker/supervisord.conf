[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/php-fpm.err.log
stdout_logfile=/var/log/supervisor/php-fpm.out.log

[program:horizon]
command=php /var/www/artisan horizon
autostart=true
autorestart=true
user=www
startretries=3
stderr_logfile=/var/log/supervisor/horizon.err.log
stdout_logfile=/var/log/supervisor/horizon.out.log
directory=/var/www

[program:queue-worker]
command=php /var/www/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
user=www
startretries=3
numprocs=2
process_name=%(program_name)s_%(process_num)02d
stderr_logfile=/var/log/supervisor/queue-%(process_num)02d.err.log
stdout_logfile=/var/log/supervisor/queue-%(process_num)02d.out.log
directory=/var/www

[program:scheduler]
command=php /var/www/artisan schedule:work
autostart=true
autorestart=true
user=www
startretries=3
stderr_logfile=/var/log/supervisor/scheduler.err.log
stdout_logfile=/var/log/supervisor/scheduler.out.log
directory=/var/www

[program:reverb]
command=php /var/www/artisan reverb:start
autostart=false
autorestart=true
user=www
startretries=3
stderr_logfile=/var/log/supervisor/reverb.err.log
stdout_logfile=/var/log/supervisor/reverb.out.log
directory=/var/www
